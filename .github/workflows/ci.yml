name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: overturn
          POSTGRES_PASSWORD: overturn
          POSTGRES_DB: overturn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U overturn"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Create test database
        run: |
          PGPASSWORD=overturn psql -h localhost -U overturn -d overturn \
            -c "CREATE DATABASE overturn_test OWNER overturn"
      - name: Install
        run: pip install -e ".[dev,server]"
      - name: Pytest
        env:
          TEST_DATABASE_URL: postgresql+psycopg://overturn:overturn@localhost:5432/overturn_test
        run: pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Vitest
        working-directory: frontend
        run: npm test
      - name: Build SPA
        working-directory: frontend
        run: npm run build:app
      - name: Template in sync with source
        working-directory: frontend
        run: |
          npm run build:template
          git diff --exit-code ../overturn/templates/workbench.html \
            || (echo "::error::overturn/templates/workbench.html is out of sync — run 'npm run build:template' and commit it" && exit 1)
