services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: overturn
      POSTGRES_PASSWORD: overturn
      POSTGRES_DB: overturn
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/db-init.sql:/docker-entrypoint-initdb.d/db-init.sql
volumes:
  db-data:
